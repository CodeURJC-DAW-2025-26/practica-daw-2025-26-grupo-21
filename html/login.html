<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - La Phonoteka</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body data-theme="light">

    <header class="site-header">
        <div class="container header-container">
            <a href="index.html" class="logo">La Phonoteka</a>
            <div class="search-bar">
                <span class="material-icons">search</span>
                <input type="text" placeholder="Buscar en la colección...">
            </div>
            <nav class="user-actions">
                <a href="login.html" class="btn btn-secondary">Iniciar Sesión</a>
                <a href="register.html" class="btn btn-primary">Registrarse</a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">
                    <span class="material-icons icon-light">light_mode</span>
                    <span class="material-icons icon-dark">dark_mode</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="form-page-container">
        <div class="form-wrapper">
            <h2>Iniciar Sesión</h2>
            <form>
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full-width">Entrar</button>
            </form>
            <div class="form-links">
                <a href="#">¿Has olvidado tu contraseña?</a>
                <span>·</span>
                <a href="register.html">¿No tienes cuenta? Regístrate</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 La Phonoteka. Hecho con ❤️ para coleccionistas.</p>
        </div>
    </footer>
    
    <script src="../js/script.js"></script>
</body>
</html>
